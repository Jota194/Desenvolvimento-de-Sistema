<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Parcelamento Simples</title>
</head>
<body>
    <h2>Parcelamento sem Juros </h2>
    <label for="valorCompra">Valor total da compra (R$):</label>
    <input type="number" id="valorCompra" step="0.01" min="0">
    <button onclick="calcularParcelas()">Calcular</button>

    <p id="resultado"></p>

    <script>
        function calcularParcelas() {
            const numeroParcelas = 5;
            let valorTotal = parseFloat(document.getElementById("valorCompra").value);

            if (isNaN(valorTotal) || valorTotal <= 0) {
                alert("Digite um valor válido maior que zero.");
                return;
            }

            let valorParcela = valorTotal / numeroParcelas;

            document.getElementById("resultado").innerHTML =
                "Valor total: R$ " + valorTotal.toFixed(2) + "<br>" +
                "Número de parcelas: " + numeroParcelas + "<br>" +
                "Valor de cada parcela: R$ " + valorParcela.toFixed(2);
        }
    </script>
</body>
</html>
