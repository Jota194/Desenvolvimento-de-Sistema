<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aumento de Preço</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1e7e34;
    }

    .resultado {
      margin-top: 15px;
      background: #eef;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Reajuste de Preço</h2>

  <input type="number" id="preco" placeholder="Digite o preço do produto">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
  function calcular() {
    let preco = parseFloat(document.getElementById("preco").value);

    if (isNaN(preco) || preco <= 0) {
      document.getElementById("resultado").innerHTML = "<p>Digite um valor válido.</p>";
      return;
    }

    let aumento = preco * 0.15;
    let novoPreco = preco + aumento;
    let percentual = 15;
    let diferenca = novoPreco - preco;

    document.getElementById("resultado").innerHTML = `
      <p><strong>Preço original:</strong> R$ ${preco.toFixed(2)}</p>
      <p><strong>Valor do aumento (15%):</strong> R$ ${aumento.toFixed(2)}</p>
      <p><strong>Novo preço:</strong> R$ ${novoPreco.toFixed(2)}</p>
      <hr>
      <p><strong>Percentual aplicado:</strong> ${percentual}%</p>
      <p><strong>Diferença:</strong> R$ ${diferenca.toFixed(2)}</p>
    `;
  }
</script>

</body>
</html>
