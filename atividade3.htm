
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calculadora de Desconto </h2>
        <label for="precoOriginal">Preço original do produto (R$):</label>
        <input type="number" id="precoOriginal" placeholder="Digite o preço" step="0.01" min="0">
        <button onclick="calcularDesconto()">Calcular Desconto</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calcularDesconto() {
            let precoOriginal = parseFloat(document.getElementById("precoOriginal").value);

            if (isNaN(precoOriginal) || precoOriginal <= 0) {
                alert("Por favor, insira um valor válido maior que zero.");
                return;
            }

            
            let desconto = precoOriginal * 0.10;

           
            let precoFinal = precoOriginal - desconto;

           
            document.getElementById("resultado").innerHTML =
                "Valor do desconto: R$ " + desconto.toFixed(2) + "<br>" +
                "Preço final: R$ " + precoFinal.toFixed(2);
        }
    </script>
</body>
</html>
