<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comissão</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calculadora de Comissão </h2>
        <label for="totalVendas">Valor total das vendas do mês (R$):</label>
        <input type="number" id="totalVendas" placeholder="Digite o valor total" step="0.01" min="0">
        <button onclick="calcularComissao()">Calcular Comissão</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calcularComissao() {
            let totalVendas = parseFloat(document.getElementById("totalVendas").value);

            if (isNaN(totalVendas) || totalVendas <= 0) {
                alert("Por favor, insira um valor válido maior que zero.");
                return;
            }

            let comissao = totalVendas * 0.05;

          
            document.getElementById("resultado").innerHTML =
                "Valor total das vendas: R$ " + totalVendas.toFixed(2) + "<br>" +
                "Comissão do vendedor: R$ " + comissao.toFixed(2);
        }
    </script>
</body>
</html>
