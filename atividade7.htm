<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background-color: #ffc107;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e0a800;
        }
        .resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Controle de Estoque</h2>
        <p>Estoque inicial: 120 unidades</p>
        <label for="quantidadeVendida">Quantidade vendida:</label>
        <input type="number" id="quantidadeVendida" placeholder="Digite a quantidade vendida" step="1" min="0">
        <button onclick="atualizarEstoque()">Calcular Estoque</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        const estoqueInicial = 120;

        function atualizarEstoque() {
            let vendidas = parseInt(document.getElementById("quantidadeVendida").value);

            if (isNaN(vendidas) || vendidas < 0) {
                alert("Por favor, insira um valor válido (0 ou maior).");
                return;
            }

            if (vendidas > estoqueInicial) {
                alert("Quantidade vendida maior que o estoque disponível!");
                return;
            }

            let estoqueRestante = estoqueInicial - vendidas;

            document.getElementById("resultado").innerHTML =
                "Estoque inicial: " + estoqueInicial + " unidades<br>" +
                "Quantidade vendida: " + vendidas + " unidades<br>" +
                "Estoque restante: " + estoqueRestante + " unidades";
        }
    </script>
</body>
</html>
