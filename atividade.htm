
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>caderneta</title>
   
</head>
<body>
    <div class="caixa">
        <h2>Calculadora de Cadernos</h2>
        <p>Preço unitário: R$ 12,50</p>
        <input type="number" id="quantidade" placeholder="quantidade" min="1">
        <button onclick="calcularTotal()">Calcular</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calcularTotal() {
            const precoUnitario = 12.50;
            const quantidade = parseInt(document.getElementById('quantidade').value);
            
            if (isNaN(quantidade) || quantidade <= 0) {
                document.getElementById('resultado').textContent = "por favor, insira uma quantidade válida.";
                return;
            }

            const total = precoUnitario * quantidade;

            const totalFormatado = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            document.getElementById('resultado').textContent = 
                `você comprou ${quantidade} caderno(s) a R$ ${precoUnitario.toFixed(2)} cada.\nTotal a pagar: ${totalFormatado}`;
        }
    </script>
     <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input[type="number"] {
            padding: 10px;
            width: 80px;
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .resultado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</body>
</html>
